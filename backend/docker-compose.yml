services:
  db:
    image: postgres:16
    container_name: workatcafe-db
    environment:
      POSTGRES_DB: workatcafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/workatcafe

volumes:
  postgres_data:
